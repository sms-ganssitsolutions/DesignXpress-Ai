# Docker Security Scanning with Trivy
# Scans Docker images for vulnerabilities on push to main, on PRs, and on schedule.
# Results are uploaded to GitHub Security tab (Code Scanning).

name: Docker Security Scan (Trivy)

on:
  push:
    branches: [ "master", "main" ]
    paths:
      - '**/Dockerfile*'
      - 'docker-compose*.yml'
      - '.github/workflows/docker-security-scan.yml'
  pull_request:
    branches: [ "master", "main" ]
    paths:
      - '**/Dockerfile*'
      - 'docker-compose*.yml'
  schedule:
    - cron: '0 6 * * 1'   # Every Monday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  trivy-scan:
    name: Scan Docker Images with Trivy
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile:
          - docker/Dockerfile.prod          # Adjust these paths to match your actual Dockerfiles
          - backend/Dockerfile.prod
          - frontend/Dockerfile.prod
        include:
          - dockerfile: docker/Dockerfile.prod
            image: ghcr.io/${{ github.repository }}/app
          - dockerfile: backend/Dockerfile.prod
            image: ghcr.io/${{ github.repository }}/backend
          - dockerfile: frontend/Dockerfile.prod
            image: ghcr.io/${{ github.repository }}/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image for scanning
        run: |
          docker build -t ${{ matrix.image }}:scan -f ${{ matrix.dockerfile }} .

      - name: Run Trivy vulnerability scanner (SARIF output)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ matrix.image }}:scan'
          format: 'sarif'
          output: 'trivy-results-${{ matrix.dockerfile }}.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'   # Do not fail the build on findings (we want to see them in Security tab)

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results-${{ matrix.dockerfile }}.sarif'
          category: 'trivy-${{ matrix.dockerfile }}'

      - name: Run Trivy for human-readable table output
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ matrix.image }}:scan'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
