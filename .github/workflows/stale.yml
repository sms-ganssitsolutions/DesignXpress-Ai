# Stale Bot Configuration
# Automatically marks and closes stale issues and pull requests.
# This helps keep the repository clean and focused.

name: Stale

on:
  schedule:
    - cron: '0 0 * * *'   # Run daily at midnight UTC
  workflow_dispatch:      # Allow manual trigger

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and close stale issues/PRs
    runs-on: ubuntu-latest
    steps:
      - name: Run stale action
        uses: actions/stale@v9
        with:
          # General settings
          days-before-stale: 30
          days-before-close: 7
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had recent activity.
            It will be closed if no further activity occurs. Thank you for your contributions.
          stale-pr-message: |
            This pull request has been automatically marked as stale because it has not had recent activity.
            It will be closed if no further activity occurs. Thank you for your contributions.
          close-issue-message: 'This issue was closed because it has been inactive for 7 days since being marked stale.'
          close-pr-message: 'This pull request was closed because it has been inactive for 7 days since being marked stale.'

          # Exemptions
          exempt-issue-labels: 'pinned,security,bug,help wanted'
          exempt-pr-labels: 'pinned,security,dependencies'

          # Labels
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'

          # Operations
          operations-per-run: 100
          remove-stale-when-updated: true
          delete-branch: false
