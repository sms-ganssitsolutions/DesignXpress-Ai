version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: designxpress-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: designxpress
      POSTGRES_PASSWORD: designxpress_dev_2026
      POSTGRES_DB: designxpress_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U designxpress"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: designxpress-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: designxpress-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@designxpress.ai
      PGADMIN_DEFAULT_PASSWORD: designxpress2026
    ports:
      - "8080:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
